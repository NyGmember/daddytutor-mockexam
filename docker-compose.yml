services:
  mock-exam:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: mock-exam-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - GITHUB_REPO_RAW_URL=${GITHUB_REPO_RAW_URL:-https://raw.githubusercontent.com/NyGmember/daddytutor-mockexam/main/}
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - db-data:/app/data
      - image-data:/app/public/images

volumes:
  db-data:
  image-data:
